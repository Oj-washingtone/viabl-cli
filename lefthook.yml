pre-commit:
    jobs:
        - run: pnpm run format-and-check
          glob:
              - "**/*.js"
              - "**/*.jsx"
              - "**/*.ts"
              - "**/*.tsx"
              - "**/*.json"
              - "**/*.jsonc"
          stage_fixed: true

commit-msg:
    commands:
        lint commit message:
            run: pnpm dlx commitlint --edit "$1"
