name: Publish to npm

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Package build output
              run: tar -czf content-server.tar.gz -C dist .
              # Change 'dist' to whatever your build output folder is (e.g. build, out, lib)

            - name: Publish to npm
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Upload release asset
              run: gh release upload ${{ github.ref_name }} content-server.tar.gz
              env:
                  GH_TOKEN: ${{ github.token }}
