name: Bug Report
description: Report an issue that should be fixed
labels:
  - bug
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a bug report. It helps make viabl better.

        If you need help or support using viabl, and are not reporting a bug, please
        join our [Discord](https://discord.gg/JyBMrk4G) server, where you can ask questions in the forum.

        Make sure you are running the [latest](https://www.npmjs.com/package/@viablkit/cli) version of viabl cli and the latest version of render and viabl server.
        The bug you are experiencing may already have been fixed.

        Please try to include as much information as possible.

  - type: input
    attributes:
      label: What version of viabl cli is running?
      description: Copy the output of `viabl --version`

  - type: input
    attributes:
      label: What version of viabl render and server is running?
      description: Copy the output of `viabl version-info`

  - type: input
    attributes:
      label: What platform is your computer?
      description: |
        For MacOS and Linux: copy the output of `uname -mprs`
        For Windows: copy the output of `"$([Environment]::OSVersion | ForEach-Object VersionString) $(if ([Environment]::Is64BitOperatingSystem) { "x64" } else { "x86" })"` in the PowerShell console
  
  - type: textarea
    attributes:
      label: What steps can reproduce the bug?
      description: Explain the bug and provide a instructions that can reproduce it.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional information
      description: Is there anything else you think we should know?